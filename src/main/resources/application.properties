spring.application.name=expensesTrack

# H2 ? FILE-BASED so data survives restarts (was jdbc:h2:mem: which wiped everything)
spring.datasource.url=jdbc:h2:file:./data/expensedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
server.address=0.0.0.0
# H2 console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# Hibernate
spring.jpa.hibernate.ddl-auto=update

# Show SQL in logs so you can see what's being inserted/queried
spring.jpa.show-sql=true